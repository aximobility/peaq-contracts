[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache_path = "cache"

solc_version = "0.8.24"
optimizer = true
optimizer_runs = 10_000
via_ir = true
evm_version = "shanghai"
bytecode_hash = "none"
cbor_metadata = false

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "forge-std/=lib/forge-std/src/",
]

fs_permissions = [{ access = "read-write", path = "./" }]
ffi = false

# Lint + style
fmt = { line_length = 110, tab_width = 4, bracket_spacing = false, int_types = "long", quote_style = "double", number_underscore = "thousands" }

# Gas reporting on every run; baseline via `forge snapshot`.
gas_reports = ["*"]

[profile.ci]
fuzz = { runs = 5_000 }
invariant = { runs = 256, depth = 32 }

[profile.dev]
fuzz = { runs = 256 }
invariant = { runs = 16, depth = 8 }

[rpc_endpoints]
agung = "${PEAQ_RPC_HTTP_AGUNG}"
mainnet = "${PEAQ_RPC_HTTP_MAINNET}"
local = "http://127.0.0.1:8545"

[etherscan]
agung = { key = "${PEAQ_AGUNG_VERIFIER_KEY}", url = "https://agung-testnet.subscan.io/api" }
mainnet = { key = "${PEAQ_MAINNET_VERIFIER_KEY}", url = "https://peaq.subscan.io/api" }
